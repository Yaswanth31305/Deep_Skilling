<header class="app-header">
  <div class="header-inner">

    <a class="logo" routerLink="/" [title]="pageTitle">
      <div class="logo-icon">🎓</div>
      <div class="logo-text">
        <span class="logo-main">EduPortal</span>
        <span class="logo-sub">Student Hub</span>
      </div>
    </a>

    <nav class="nav-desktop" role="navigation" aria-label="Main navigation">
      <a *ngFor="let item of navItems"
         [routerLink]="item.route"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: item.route === '/' }"
         class="nav-link"
         (click)="onNavClick(item.route)"
         [attr.aria-label]="'Navigate to ' + item.label">
        <span class="nav-icon">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="header-right">

      <div class="user-chip" *ngIf="authService.currentUser() as user">
        <div class="user-avatar">{{ user.name.charAt(0) }}</div>
        <span class="user-name">{{ user.name.split(' ')[0] }}</span>
      </div>

      <button class="btn btn-secondary btn-sm logout-btn"
              *ngIf="authService.isLoggedIn()"
              (click)="logout()"
              id="logout-btn">
        Sign Out
      </button>

      <button class="menu-toggle"
              (click)="toggleMenu()"
              [attr.aria-expanded]="menuOpen()"
              aria-label="Toggle mobile menu"
              id="menu-toggle-btn">
        <span [ngClass]="{ 'open': menuOpen() }">☰</span>
      </button>
    </div>
  </div>

  <nav class="nav-mobile" *ngIf="menuOpen()" role="navigation" aria-label="Mobile navigation">
    <a *ngFor="let item of navItems"
       [routerLink]="item.route"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: item.route === '/' }"
       class="mobile-nav-link"
       (click)="onNavClick(item.route)">
      <span>{{ item.icon }}</span> {{ item.label }}
    </a>
  </nav>
</header>
